backend:
  name: github
  repo: neerav-git/neerav-git.github.io
  branch: main
  # Replace these with your deployed cms-auth-proxy values.
  base_url: https://neerav-git-github-io.vercel.app
  auth_endpoint: /api/auth

local_backend: true
publish_mode: editorial_workflow
site_url: https://neerav-git.github.io
display_url: https://neerav-git.github.io
logo_url: /favicon.ico
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site_settings
    label: Site Structure
    delete: false
    editor:
      preview: false
    files:
      - label: Site Shell, Intros, and About
        name: site
        file: content/settings/site.json
        format: json
        fields:
          - { label: Site Title, name: siteTitle, widget: string, hint: "Shown in the header brand mark." }
          - { label: Site Tagline, name: siteTagline, widget: text, hint: "Shown under the site title in the header." }
          - { label: Footer Line, name: footerLine, widget: string, required: false, hint: "Short note shown in the footer." }
          - { label: Contact Email, name: contactEmail, widget: string, required: false, hint: "Shown in the footer contact area." }
          - label: Social Links
            name: socialLinks
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string }
          - label: Navigation
            name: navigation
            widget: object
            hint: "These labels appear in the site navigation."
            fields:
              - { label: Home Label, name: homeLabel, widget: string }
              - { label: Projects Label, name: projectsLabel, widget: string }
              - { label: Writing Label, name: writingLabel, widget: string }
              - { label: Archive Label, name: archiveLabel, widget: string }
              - { label: About Label, name: aboutLabel, widget: string }
              - { label: Resume Label, name: resumeLabel, widget: string, required: false }
              - { label: Recommendations Label, name: recommendationsLabel, widget: string }
          - label: Page Intros
            name: pageIntros
            widget: object
            hint: "These headings and summaries appear at the top of the major section pages."
            fields:
              - label: Projects
                name: projects
                widget: object
                fields:
                  - { label: Label, name: label, widget: string, required: false }
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Intro, name: intro, widget: text, required: false }
              - label: Writing
                name: writing
                widget: object
                fields:
                  - { label: Label, name: label, widget: string, required: false }
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Intro, name: intro, widget: text, required: false }
              - label: Archive
                name: archive
                widget: object
                fields:
                  - { label: Label, name: label, widget: string, required: false }
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Intro, name: intro, widget: text, required: false }
              - label: About
                name: about
                widget: object
                fields:
                  - { label: Label, name: label, widget: string, required: false }
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Intro, name: intro, widget: text, required: false }
              - label: Resume
                name: resume
                widget: object
                fields:
                  - { label: Label, name: label, widget: string, required: false }
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Intro, name: intro, widget: text, required: false }
              - label: Recommendations
                name: recommendations
                widget: object
                fields:
                  - { label: Label, name: label, widget: string, required: false }
                  - { label: Title, name: title, widget: string, required: false }
                  - { label: Intro, name: intro, widget: text, required: false }
          - label: About Section
            name: about
            widget: object
            hint: "This controls the public About page."
            fields:
              - { label: Lead, name: lead, widget: text, required: false, hint: "Short summary line near the top of the About page." }
              - { label: Portrait, name: portrait, widget: image, required: false, hint: "Optional portrait shown beside the About text." }
              - { label: Biography Markdown, name: biographyMarkdown, widget: markdown, required: false, hint: "Main About body content." }
              - { label: Current Focus Markdown, name: currentFocusMarkdown, widget: markdown, required: false, hint: "Secondary section for current work and priorities." }
      - label: Home Page
        name: home
        file: content/settings/home.json
        format: json
        fields:
          - { label: Hero Eyebrow, name: heroEyebrow, widget: string, required: false, hint: "Small line above the homepage title." }
          - { label: Hero Title, name: heroTitle, widget: string, hint: "Main homepage headline." }
          - { label: Hero Body, name: heroBody, widget: text, required: false, hint: "Introductory paragraph on the homepage." }
          - { label: Hero Image, name: heroImage, widget: image, required: false, hint: "Optional hero image shown on the homepage." }
          - label: Hero Links
            name: heroLinks
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: URL, name: url, widget: string }
          - { label: Featured Projects Heading, name: featuredProjectsHeading, widget: string, required: false, hint: "Section heading above the homepage project cards." }
          - label: Featured Projects
            name: featuredProjectSlugs
            widget: relation
            collection: projects
            search_fields: [title, slug]
            display_fields: [title, slug]
            value_field: slug
            multiple: true
            required: false
            hint: "Ordered list of project entries shown on the homepage."
          - { label: Featured Writing Heading, name: featuredWritingHeading, widget: string, required: false, hint: "Section heading above the homepage writing list." }
          - label: Featured Writing Entries
            name: featuredArticleSlugs
            widget: relation
            collection: writing
            search_fields: [title, slug]
            display_fields: [title, slug]
            value_field: slug
            multiple: true
            required: false
            hint: "Ordered list of writing entries shown on the homepage."
          - { label: Featured Archive Heading, name: featuredArchiveHeading, widget: string, required: false, hint: "Section heading above the homepage archive list." }
          - label: Featured Archive Entries
            name: featuredArchiveSlugs
            widget: relation
            collection: archive
            search_fields: [title, slug]
            display_fields: [title, slug]
            value_field: slug
            multiple: true
            required: false
            hint: "Ordered list of archive entries shown on the homepage."
          - { label: Recommendations Note, name: recommendationsNote, widget: text, required: false, hint: "Quiet note shown above the letters section on the homepage." }
          - label: Home Modules
            name: modules
            widget: list
            hint: "Reusable homepage sections shown below the featured content."
            types:
              - label: Markdown Section
                name: markdownSection
                widget: object
                fields:
                  - { label: Type, name: blockType, widget: hidden, default: markdownSection }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Markdown, name: markdown, widget: markdown }
              - label: Media Feature
                name: mediaFeature
                widget: object
                fields:
                  - { label: Type, name: blockType, widget: hidden, default: mediaFeature }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
                  - { label: Media, name: media, widget: image, required: false }
                  - { label: Caption, name: caption, widget: text, required: false }
                  - label: Layout
                    name: layout
                    widget: select
                    options: [wide, split]
              - label: Quote
                name: quote
                widget: object
                fields:
                  - { label: Type, name: blockType, widget: hidden, default: quote }
                  - { label: Quote, name: quote, widget: text }
                  - { label: Attribution, name: attribution, widget: string, required: false }
                  - { label: Context, name: context, widget: string, required: false }
              - label: Metrics
                name: metrics
                widget: object
                fields:
                  - { label: Type, name: blockType, widget: hidden, default: metrics }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - label: Items
                    name: items
                    widget: list
                    fields:
                      - { label: Value, name: value, widget: string }
                      - { label: Label, name: label, widget: string }
                      - { label: Context, name: context, widget: text, required: false }
              - label: Link Group
                name: links
                widget: object
                fields:
                  - { label: Type, name: blockType, widget: hidden, default: links }
                  - { label: Title, name: title, widget: string }
                  - label: Links
                    name: links
                    widget: list
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: URL, name: url, widget: string }
                      - { label: Description, name: description, widget: text, required: false }
              - label: Attachment Group
                name: attachments
                widget: object
                fields:
                  - { label: Type, name: blockType, widget: hidden, default: attachments }
                  - { label: Title, name: title, widget: string }
                  - label: Attachments
                    name: attachments
                    widget: list
                    fields:
                      - { label: Label, name: label, widget: string }
                      - { label: Description, name: description, widget: text, required: false }
                      - { label: File, name: file, widget: file, required: false }
                      - { label: External URL, name: externalUrl, widget: string, required: false }

  - name: projects
    label: Projects
    label_singular: Project
    folder: content/projects
    create: true
    format: json
    extension: json
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{fields.title}}"
    fields: &project_like_fields
      - { label: Title, name: title, widget: string, hint: "Used on the project card and the project detail page." }
      - { label: Slug, name: slug, widget: string, hint: "Used in the project URL." }
      - { label: Card Eyebrow, name: cardEyebrow, widget: string, required: false, hint: "Small label shown above the project title on cards and headers." }
      - { label: Date Label, name: dateLabel, widget: string, required: false, hint: "Short date or status label shown with the project." }
      - { label: Summary, name: summary, widget: text, hint: "Used on both the project card and the detail page header." }
      - { label: Problem, name: problem, widget: text, required: false, hint: "Concrete problem shown in project cards and detail headers." }
      - { label: Approach, name: approach, widget: text, required: false, hint: "Concrete approach shown in project cards and detail headers." }
      - { label: Output, name: output, widget: text, required: false, hint: "Concrete artifact or result shown in project cards and detail headers." }
      - { label: Role, name: role, widget: string, required: false, hint: "Optional role line shown near the top of the detail page." }
      - { label: Featured, name: featured, widget: boolean, required: false, default: false, hint: "Fallback flag for homepage featuring if no explicit home selection is set." }
      - { label: Display Order, name: displayOrder, widget: number, required: false, value_type: int, hint: "Controls ordering on the projects index page." }
      - { label: Cover Image, name: coverImage, widget: image, required: false, hint: "Large image shown on the project detail page." }
      - label: Gallery
        name: gallery
        widget: list
        required: false
        hint: "Additional images for the project detail page."
        field: { label: Image, name: url, widget: image }
      - label: Technologies
        name: technologies
        widget: list
        required: false
        field:
          label: Technology
          name: value
          widget: string
      - label: Links
        name: links
        widget: list
        required: false
        hint: "External links shown in the project resources area."
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
          - { label: Description, name: description, widget: text, required: false }
      - label: Attachments
        name: attachments
        widget: list
        required: false
        hint: "Upload PDFs, datasets, decks, posters, or supporting files here."
        fields:
          - { label: Label, name: label, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: File, name: file, widget: file, required: false }
          - { label: External URL, name: externalUrl, widget: string, required: false }
      - label: Page Sections
        name: pageSections
        widget: list
        required: false
        hint: "Main editorial sections for the project detail page."
        types: &block_types
          - label: Section Lead
            name: sectionLead
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: sectionLead }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text, required: false }
              - { label: Context Line, name: context, widget: text, required: false, hint: "Short supporting line shown beneath the lead." }
          - label: Markdown Section
            name: markdownSection
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: markdownSection }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Markdown, name: markdown, widget: markdown }
              - { label: Description, name: description, widget: text, required: false, hint: "Optional standfirst above the main prose." }
              - { label: Context Line, name: context, widget: text, required: false }
          - label: Prose Section
            name: proseSection
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: proseSection }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text, required: false }
              - { label: Markdown, name: markdown, widget: markdown }
              - { label: Context Line, name: context, widget: text, required: false }
              - label: Layout
                name: layout
                widget: select
                required: false
                options: [narrow, wide]
          - label: Media Feature
            name: mediaFeature
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: mediaFeature }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text, required: false }
              - { label: Media, name: media, widget: image, required: false }
              - { label: Caption, name: caption, widget: text, required: false }
              - label: Layout
                name: layout
                widget: select
                options: [wide, split]
          - label: Figure
            name: figure
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: figure }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text, required: false }
              - { label: Media, name: media, widget: image, required: false }
              - { label: Caption, name: caption, widget: text, required: false }
              - label: Layout
                name: layout
                widget: select
                options: [wide, split]
          - label: Quote
            name: quote
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: quote }
              - { label: Quote, name: quote, widget: text }
              - { label: Attribution, name: attribution, widget: string, required: false }
              - { label: Context, name: context, widget: string, required: false }
          - label: Callout
            name: callout
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: callout }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text, required: false }
              - { label: Markdown, name: markdown, widget: markdown }
              - { label: Context Line, name: context, widget: text, required: false }
          - label: Metrics
            name: metrics
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: metrics }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Value, name: value, widget: string }
                  - { label: Label, name: label, widget: string }
                  - { label: Context, name: context, widget: text, required: false }
          - label: Insight Grid
            name: insightGrid
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: insightGrid }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text, required: false }
              - label: Items
                name: items
                widget: list
                fields:
                  - { label: Label, name: label, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Body, name: body, widget: text, required: false }
                  - { label: Context, name: context, widget: text, required: false }
          - label: Timeline
            name: timeline
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: timeline }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text, required: false }
              - label: Steps
                name: items
                widget: list
                fields:
                  - { label: Step Label, name: label, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Body, name: body, widget: text, required: false }
                  - { label: Context, name: context, widget: text, required: false }
          - label: Link Group
            name: links
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: links }
              - { label: Title, name: title, widget: string }
              - label: Links
                name: links
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: URL, name: url, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
          - label: Attachment Group
            name: attachments
            widget: object
            fields:
              - { label: Type, name: blockType, widget: hidden, default: attachments }
              - { label: Title, name: title, widget: string }
              - label: Attachments
                name: attachments
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Description, name: description, widget: text, required: false }
                  - { label: File, name: file, widget: file, required: false }
                  - { label: External URL, name: externalUrl, widget: string, required: false }
      - label: GitHub
        name: github
        widget: object
        required: false
        hint: "Repository sync settings and imported README content."
        fields:
          - { label: Sync Enabled, name: syncEnabled, widget: boolean, required: false, default: true }
          - { label: Owner, name: owner, widget: string, required: false }
          - { label: Repo, name: repo, widget: string, required: false }
          - { label: Repo Name, name: repoName, widget: string, required: false }
          - { label: Repo URL, name: repoUrl, widget: string, required: false }
          - { label: Source Description, name: sourceDescription, widget: text, required: false }
          - { label: README Path, name: sourceReadmePath, widget: string, required: false }
          - { label: Imported README Markdown, name: importedReadmeMarkdown, widget: markdown, required: false }

  - name: writing
    label: Writing
    label_singular: Writing Entry
    folder: content/writing
    create: true
    format: json
    extension: json
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{fields.title}}"
    fields:
      - { label: Title, name: title, widget: string, hint: "Shown on the writing index and article detail page." }
      - { label: Slug, name: slug, widget: string, hint: "Used in the article URL." }
      - { label: Category, name: category, widget: string, required: false, hint: "Short label shown beside the article entry." }
      - { label: Publish Date, name: publishDate, widget: datetime, required: false, hint: "Used to sort writing entries." }
      - { label: Excerpt, name: excerpt, widget: text, hint: "Short summary shown on cards and at the top of the article page." }
      - { label: Cover Image, name: coverImage, widget: image, required: false, hint: "Optional visual used on the writing index and at the top of the article page." }
      - { label: Featured, name: featured, widget: boolean, required: false, default: false, hint: "Optional flag for homepage fallback selection." }
      - label: Links
        name: links
        widget: list
        required: false
        hint: "External references shown in the article resources area."
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
          - { label: Description, name: description, widget: text, required: false }
      - label: Attachments
        name: attachments
        widget: list
        required: false
        hint: "Upload files or add external references tied to this article."
        fields:
          - { label: Label, name: label, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: File, name: file, widget: file, required: false }
          - { label: External URL, name: externalUrl, widget: string, required: false }
      - label: Page Sections
        name: pageSections
        widget: list
        required: false
        hint: "Main body sections for the writing entry."
        types: *block_types

  - name: archive
    label: Archive
    label_singular: Archive Entry
    folder: content/archive
    create: true
    format: json
    extension: json
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{fields.title}}"
    fields:
      - { label: Title, name: title, widget: string, hint: "Shown on the archive index and detail page." }
      - { label: Slug, name: slug, widget: string, hint: "Used in the archive URL." }
      - { label: Item Type, name: itemType, widget: string, required: false, hint: "Short label such as paper, note, dataset, or record." }
      - { label: Date Label, name: dateLabel, widget: string, required: false, hint: "Short date or stage label for the archive item." }
      - { label: Summary, name: summary, widget: text, hint: "Short summary shown on the index and detail header." }
      - { label: Preview Image, name: previewImage, widget: image, required: false, hint: "Optional preview image for this archive item." }
      - label: Links
        name: links
        widget: list
        required: false
        hint: "External references for this archive item."
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
          - { label: Description, name: description, widget: text, required: false }
      - label: Attachments
        name: attachments
        widget: list
        required: false
        hint: "Upload supporting files such as papers, notes, screenshots, or PDFs."
        fields:
          - { label: Label, name: label, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: File, name: file, widget: file, required: false }
          - { label: External URL, name: externalUrl, widget: string, required: false }
      - label: Page Sections
        name: pageSections
        widget: list
        required: false
        hint: "Main body sections for the archive detail page."
        types: *block_types

  - name: recommendations
    label: Resume and References
    label_singular: Resume or Reference Record
    folder: content/recommendations
    create: true
    format: json
    extension: json
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{fields.title}}"
    fields:
      - { label: Title, name: title, widget: string, hint: "Shown on the resume or references page." }
      - { label: Slug, name: slug, widget: string, hint: "Used in the content file name." }
      - { label: Name, name: recommenderName, widget: string, hint: "For a resume record, use your name. For a letter, use the recommender name." }
      - { label: Role or Document Type, name: recommenderRole, widget: string, required: false, hint: "Examples: Resume / CV, Professor, Research Advisor." }
      - { label: Context, name: context, widget: text, required: false, hint: "Short public note for why this document is included." }
      - { label: Excerpt, name: excerpt, widget: text, required: false, hint: "Optional short excerpt shown in the public card." }
      - { label: Thumbnail, name: thumbnail, widget: image, required: false, hint: "Optional image preview for the document." }
      - { label: PDF File, name: pdfLetter, widget: file, required: false, hint: "Upload the resume, letter, or reference PDF here." }
      - { label: Visibility Priority, name: visibilityPriority, widget: number, required: false, value_type: int, hint: "Lower numbers appear first." }
      - label: Links
        name: links
        widget: list
        required: false
        hint: "Optional supporting links for this letter record."
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
          - { label: Description, name: description, widget: text, required: false }
